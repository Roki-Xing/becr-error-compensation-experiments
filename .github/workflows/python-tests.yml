name: python-tests

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest
      - name: Run unit tests
        run: python -m pytest -q
      - name: Smoke-generate moving projection artifacts
        run: python experiments/tier1-synthetic/run_moving_projection_state_suite.py
